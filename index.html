<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Donate Page</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      text-align: center;
    }

    .image-container {
      width: 100%; /* Ekranƒ±n 100%-ni tutur */
      display: flex;
      flex-direction: column; /* ≈û…ôkill…ôri alt-alta yerl…ô≈üdirir */
    }

    .image-container img {
      width: 100%; /* ≈û…ôkill…ôr ekranƒ± tam doldurur */
      height: auto; /* √ñl√ß√ºl…ôrin nisb…ôtini qoruyur */
    }

    #donateButton {
      margin-top: 10px;
      padding: 10px 20px;
      background-color: #007BFF;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
    }

    #totalAmount {
      margin-top: 10px;
      font-size: 18px;
      color: green;
    }

    /* Modal styles */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      background: white;
      padding: 20px;
      border-radius: 5px;
      width: 300px;
      text-align: left;
    }

    .modal-content input {
      display: block;
      margin: 10px 0;
      padding: 10px;
      width: calc(100% - 20px);
    }

    button:disabled {
      background-color: gray;
    }

    .close {
      float: right;
      font-size: 20px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="image-container">
    <img src="1.png" alt="Image 1">
    <img src="2.png" alt="Image 2">
  </div>

  <button id="donateButton">Donate</button>
  <p id="totalAmount">Total Collected: $0</p>

  <!-- Modal -->
  <div id="donateModal" class="modal">
    <div class="modal-content">
      <span class="close">&times;</span>
      <h2>Donate</h2>
      <label for="amount">Amount ($):</label>
      <input type="number" id="amount" min="1">
      <label for="card">Card Code:</label>
      <input type="text" id="card" placeholder="Enter your card code here">
      <button id="submitDonate" disabled>Submit</button>
    </div>
  </div>

  <script>
    let totalAmount = 0;

    // A√ßƒ±lƒ±r p…ônc…ôr…ôni idar…ô etm…ôk
    const modal = document.getElementById("donateModal");
    const donateButton = document.getElementById("donateButton");
    const closeButton = document.querySelector(".close");
    const submitButton = document.getElementById("submitDonate");
    const amountInput = document.getElementById("amount");
    const cardInput = document.getElementById("card");
    const totalAmountDisplay = document.getElementById("totalAmount");

    donateButton.addEventListener("click", () => {
      modal.style.display = "flex";
    });

    closeButton.addEventListener("click", () => {
      modal.style.display = "none";
    });

    window.addEventListener("click", (e) => {
      if (e.target === modal) {
        modal.style.display = "none";
      }
    });

    function validateInputs() {
      submitButton.disabled = !(amountInput.value > 0 && cardInput.value.trim().length >= 16);
    }

    amountInput.addEventListener("input", validateInputs);
    cardInput.addEventListener("input", validateInputs);

    submitButton.addEventListener("click", () => {
      totalAmount += parseFloat(amountInput.value);
      totalAmountDisplay.innerText = `Total Collected: $${totalAmount}`;
      modal.style.display = "none";

      // Clear inputs
      amountInput.value = "";
      cardInput.value = "";
      submitButton.disabled = true;

      // Qeyd: Burada real √∂d…ôni≈üi h…ôyata ke√ßirm…ôk √º√ß√ºn …ôlav…ô kod yazƒ±lmalƒ±dƒ±r!
      console.log("√ñd…ôni≈ü q…ôbul edildi.");
    });
  </script>
</body>
</html>
